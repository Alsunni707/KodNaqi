<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دخول - مؤسسة كود نقي</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #0089ba; --bg: #e1f5fe; }
        body { font-family: 'Tajawal', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .login-container { background: white; width: 90%; max-width: 400px; border-radius: 25px; overflow: hidden; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; }
        .header-blue { background: var(--primary); padding: 30px; color: white; }
        .header-blue img { width: 80px; background: white; border-radius: 15px; padding: 5px; }
        .content { padding: 30px; }
        .input-group { position: relative; margin-bottom: 20px; }
        input { width: 100%; padding: 15px; border: 2px solid #eee; border-radius: 12px; outline: none; transition: 0.3s; text-align: center; font-size: 1rem; }
        input:focus { border-color: var(--primary); }
        .login-btn { width: 100%; padding: 15px; background: #8e9aaf; color: white; border: none; border-radius: 12px; font-size: 1.1rem; cursor: pointer; transition: 0.3s; }
        .login-btn.active { background: var(--primary); }
        .roles-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 25px; }
        .role-card { background: #f8f9fa; padding: 10px; border-radius: 10px; font-size: 0.8rem; color: #777; border: 1px solid #eee; }
        .error { color: red; font-size: 0.8rem; margin-top: 10px; display: none; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="header-blue">
            <img src="logo.png" alt="Logo">
            <h2>مؤسسة كود نقي</h2>
            <p>HOSPITAL MANAGEMENT SYSTEM</p>
        </div>
        <div class="content">
            <div class="icon-box"><i class="fas fa-unlock-alt" style="font-size: 2rem; color: #0089ba; margin-bottom: 10px;"></i></div>
            <h3>تسجيل الدخول</h3>
            <p style="color: #888;">أدخل كلمة المرور للوصول إلى النظام</p>
            
            <div class="input-group">
                <input type="password" id="pass" placeholder="أدخل كلمة المرور..." oninput="checkInput()">
                <p id="errorMsg" class="error">كلمة المرور غير صحيحة</p>
            </div>
            
            <button class="login-btn" id="loginBtn" onclick="login()">دخول إلى النظام ←</button>

            <div class="roles-grid">
                <div class="role-card"><b>المدير / Admin</b><br>صلاحيات كاملة</div>
                <div class="role-card"><b>الصيدلاني</b><br>الصيدلية والمخزون</div>
                <div class="role-card"><b>موظف الاستقبال</b><br>المرضى والمواعيد</div>
                <div class="role-card"><b>فني المختبر</b><br>الفحوصات</div>
            </div>
        </div>
    </div>

    <script>
        function checkInput() {
            const btn = document.getElementById('loginBtn');
            const pass = document.getElementById('pass').value;
            if(pass.length > 0) btn.classList.add('active');
            else btn.classList.remove('active');
        }

        function login() {
            const pass = document.getElementById('pass').value;
            const error = document.getElementById('errorMsg');
            
            // الصلاحيات كما طلبتها
            if (pass === "KODNAQI7@") { window.location.href = "dashboard.html"; }
            else if (pass === "PHARMA2026") { window.location.href = "pharmacy.html"; }
            else { error.style.display = 'block'; }
        }
    </script>
</body>
</html>
