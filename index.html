<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دخول - مؤسسة كود نقي</title>
    <link rel="icon" type="image/png" href="kod_logo.png">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0089ba; --bg: #e1f5fe; }
        body { font-family: 'Tajawal', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; width: 90%; max-width: 400px; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        .header-blue { background: var(--primary); color: white; padding: 30px; }
        .header-blue img { width: 80px; background: white; border-radius: 50%; padding: 5px; }
        .content { padding: 30px; }
        input { width: 100%; padding: 15px; margin: 15px 0; border: 2px solid #eee; border-radius: 10px; box-sizing: border-box; text-align: center; font-size: 1.1rem; }
        button { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1rem; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="header-blue">
            <img src="kod_logo.png" alt="Logo">
            <h2>مؤسسة كود نقي</h2>
            <p>نظام إدارة المستشفى</p>
        </div>
        <div class="content">
            <i class="fas fa-lock" style="font-size: 2rem; color: var(--primary);"></i>
            <h3>تسجيل الدخول</h3>
            <input type="password" id="passInput" placeholder="أدخل كلمة المرور">
            <button onclick="checkLogin()">دخول للنظام</button>
        </div>
    </div>

    <script>
        function checkLogin() {
            const pass = document.getElementById('passInput').value;
            if (pass === "KODNAQI7@") {
                window.location.href = "dashboard.html";
            } else if (pass === "PHARMA2026") {
                window.location.href = "pharmacy.html";
            } else {
                alert("كلمة المرور غير صحيحة!");
            }
        }
    </script>
</body>
</html>
