<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - كود نقي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #00a896; --bg: #f0f4f8; }
        body { font-family: 'Tajawal', sans-serif; background: var(--bg); margin: 0; display: flex; }
        
        /* القائمة الجانبية */
        .sidebar { width: 250px; background: white; height: 100vh; padding: 20px; box-shadow: 5px 0 15px rgba(0,0,0,0.05); }
        .main { flex: 1; padding: 20px; overflow-y: auto; }
        
        /* البطاقات الاحصائية */
        .stats-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; }
        .stat-card { background: white; padding: 20px; border-radius: 15px; border-bottom: 4px solid var(--primary); }
        
        /* المهام السريعة - كما في الصورة */
        .quick-actions { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; }
        .action-btn { padding: 15px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; font-size: 0.9rem; color: white; }
        .btn-patient { background: #e0f2f1; color: #00796b; }
        .btn-lab { background: #f3e5f5; color: #7b1fa2; }
        .btn-pharma { background: #fff3e0; color: #ef6c00; }
        
        /* البطاقة التعريفية والـ QR */
        .qr-card { background: white; padding: 20px; border-radius: 20px; text-align: center; margin-top: 20px; max-width: 300px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <img src="logo.png" style="width: 50px;">
        <h3>د. السني خالد</h3>
        <hr>
        <p><i class="fas fa-th-large"></i> لوحة التحكم</p>
        <p><i class="fas fa-users"></i> الموارد البشرية</p>
        <p><i class="fas fa-pills"></i> الصيدلية</p>
    </div>

    <div class="main">
        <h2>نظرة عامة ✨</h2>
        <div class="stats-container">
            <div class="stat-card"><h3>12</h3><p>إجمالي المرضى</p></div>
            <div class="stat-card"><h3>5</h3><p>حالات نشطة</p></div>
        </div>

        <h3>المهام السريعة</h3>
        <div class="quick-actions">
            <button class="action-btn btn-patient" onclick="alert('فتح سجل المرضى')">تسجيل مريض</button>
            <button class="action-btn btn-lab" onclick="alert('فتح المختبر')">طلب فحص</button>
            <button class="action-btn btn-pharma" onclick="alert('فتح الصيدلية')">صرف دواء</button>
        </div>

        <div class="qr-card">
            <h4>كود المريض (مثال)</h4>
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=PatientID-101" alt="QR">
            <p><b>رزان عادل إسماعيل</b></p>
            <button onclick="window.print()">طباعة البطاقة 🖨️</button>
        </div>
    </div>
</body>
</html>
